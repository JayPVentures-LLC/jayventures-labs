name: Azure Container App Healthcheck

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  healthcheck:
    name: Azure Container App Healthcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure healthcheck
        if: ${{ secrets.AZURE_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --silent --show-error "${{ secrets.AZURE_HEALTHCHECK_URL }}"


