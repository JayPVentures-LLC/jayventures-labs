name: Azure Container App Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "operations/**"
      - "wix/bookings/**"
      - ".github/workflows/deploy-azure-container-app.yml"
      - "package.json"
      - "package-lock.json"


permissions:
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run JPV-OS enforcement
        run: npm run jpv:enforce

  deploy:
    if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    needs: enforce
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure context
        run: az account show --output table

      - name: Deploy Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: .
          acrName: ${{ secrets.AZURE_ACR_NAME }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToBuild: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/jayventures-labs:${{ github.sha }}

      - name: Health check
        run: |
          if [ -z "${{ secrets.AZURE_HEALTHCHECK_URL }}" ]; then
            echo "AZURE_HEALTHCHECK_URL not set. Skipping health check."
            exit 0
          fi

          curl --fail --silent --show-error "${{ secrets.AZURE_HEALTHCHECK_URL }}"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
