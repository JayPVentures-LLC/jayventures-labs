name: Deploy Azure Container App

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy Azure Container App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure healthcheck
        if: ${{ secrets.AZURE_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --silent --show-error "${{ secrets.AZURE_HEALTHCHECK_URL }}"
