name: deploy-workers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which worker to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - entitlement
          - bookings

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-entitlement:
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'entitlement' }}
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Validate entitlement deploy config
        run: npm run validate:deploy:entitlement

      - name: Deploy entitlement worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config operations/entitlement-system/wrangler.toml

  deploy-bookings:
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'bookings' }}
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Validate bookings deploy config
        run: npm run validate:deploy:bookings

      - name: Deploy bookings worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wix/bookings/wrangler.toml
