name: deploy-workers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which worker to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - entitlement
          - bookings

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  deploy-entitlement:
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'entitlement' }}
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Inject entitlement deployment bindings
        shell: bash
        env:
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
          AZURE_ARCHIVE_ENDPOINT: ${{ secrets.AZURE_ARCHIVE_ENDPOINT }}
          ENTITLEMENT_KV_ID: ${{ secrets.ENTITLEMENT_KV_ID }}
          ENTITLEMENT_KV_PREVIEW_ID: ${{ secrets.ENTITLEMENT_KV_PREVIEW_ID }}
          IDEMPOTENCY_KV_ID: ${{ secrets.IDEMPOTENCY_KV_ID }}
          IDEMPOTENCY_KV_PREVIEW_ID: ${{ secrets.IDEMPOTENCY_KV_PREVIEW_ID }}
          RETRY_QUEUE_KV_ID: ${{ secrets.RETRY_QUEUE_KV_ID }}
          RETRY_QUEUE_KV_PREVIEW_ID: ${{ secrets.RETRY_QUEUE_KV_PREVIEW_ID }}
          ENTITLEMENT_EVENTS_QUEUE: ${{ secrets.ENTITLEMENT_EVENTS_QUEUE }}
        run: |
          node scripts/inject-entitlement-deploy-config.cjs

      - name: Verify Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Validate entitlement deploy config
        run: npm run validate:deploy:entitlement

      - name: Deploy entitlement worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config operations/entitlement-system/wrangler.toml

  deploy-bookings:
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'bookings' }}
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Verify Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$MEMBERSTACK_JWT_PUBLIC_KEY" || (echo "Missing MEMBERSTACK_JWT_PUBLIC_KEY" && exit 1)

      - name: Validate bookings deploy config
        run: npm run validate:deploy:bookings

      - name: Set Memberstack JWT Public Key
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
        run: |
          printf '%s' "$MEMBERSTACK_JWT_PUBLIC_KEY" | npx wrangler secret put MEMBERSTACK_JWT_PUBLIC_KEY --config wix/bookings/wrangler.toml --env production

      - name: Deploy bookings worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wix/bookings/wrangler.toml --env production

