name: JPV-OS Post-Merge Production Gate

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: jpv-os-production-deploy
  cancel-in-progress: false

jobs:
  production-gate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    environment: cloudflare-production

    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Detect production secrets
        id: production_secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ENTITLEMENTS_KV_ID: ${{ secrets.CLOUDFLARE_ENTITLEMENTS_KV_ID }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
          AZURE_ARCHIVE_ENDPOINT: ${{ secrets.AZURE_ARCHIVE_ENDPOINT }}
          ENTITLEMENT_KV_ID: ${{ secrets.ENTITLEMENT_KV_ID }}
          ENTITLEMENT_KV_PREVIEW_ID: ${{ secrets.ENTITLEMENT_KV_PREVIEW_ID }}
          IDEMPOTENCY_KV_ID: ${{ secrets.IDEMPOTENCY_KV_ID }}
          IDEMPOTENCY_KV_PREVIEW_ID: ${{ secrets.IDEMPOTENCY_KV_PREVIEW_ID }}
          RETRY_QUEUE_KV_ID: ${{ secrets.RETRY_QUEUE_KV_ID }}
          RETRY_QUEUE_KV_PREVIEW_ID: ${{ secrets.RETRY_QUEUE_KV_PREVIEW_ID }}
          ENTITLEMENT_EVENTS_QUEUE: ${{ secrets.ENTITLEMENT_EVENTS_QUEUE }}
        run: |
          missing=()
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_ENTITLEMENTS_KV_ID \
            MEMBERSTACK_JWT_PUBLIC_KEY \
            AZURE_KEY_VAULT_URL \
            AZURE_TENANT_ID \
            AZURE_CLIENT_ID \
            APPINSIGHTS_CONNECTION_STRING \
            AZURE_ARCHIVE_ENDPOINT \
            ENTITLEMENT_KV_ID \
            ENTITLEMENT_KV_PREVIEW_ID \
            IDEMPOTENCY_KV_ID \
            IDEMPOTENCY_KV_PREVIEW_ID \
            RETRY_QUEUE_KV_ID \
            RETRY_QUEUE_KV_PREVIEW_ID \
            ENTITLEMENT_EVENTS_QUEUE
          do
            if [ -z "${!name}" ]; then
              echo "Missing $name"
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "JPV-OS production deployment skipped."
              echo ""
              echo "Missing production secret count: ${#missing[@]}"
              echo ""
              printf -- '- %s\n' "${missing[@]}"
              echo ""
              echo "Code validation will still run; deploy steps are intentionally skipped until real production credentials exist."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: JPV policy enforcement
        run: |
          node scripts/jpv-policy-enforcement.cjs
          npm run jpv:enforce

      - name: Inject flagship KV namespace
        if: steps.production_secrets.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_ENTITLEMENTS_KV_ID: ${{ secrets.CLOUDFLARE_ENTITLEMENTS_KV_ID }}
        run: |
          test -n "$CLOUDFLARE_ENTITLEMENTS_KV_ID" || (echo "Missing CLOUDFLARE_ENTITLEMENTS_KV_ID" && exit 1)
          perl -0pi -e 's/YOUR_KV_NAMESPACE_ID/$ENV{CLOUDFLARE_ENTITLEMENTS_KV_ID}/g' apps/flagship-site/wrangler.toml

      - name: Inject entitlement deployment bindings
        if: steps.production_secrets.outputs.ready == 'true'
        shell: bash
        env:
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
          AZURE_ARCHIVE_ENDPOINT: ${{ secrets.AZURE_ARCHIVE_ENDPOINT }}
          ENTITLEMENT_KV_ID: ${{ secrets.ENTITLEMENT_KV_ID }}
          ENTITLEMENT_KV_PREVIEW_ID: ${{ secrets.ENTITLEMENT_KV_PREVIEW_ID }}
          IDEMPOTENCY_KV_ID: ${{ secrets.IDEMPOTENCY_KV_ID }}
          IDEMPOTENCY_KV_PREVIEW_ID: ${{ secrets.IDEMPOTENCY_KV_PREVIEW_ID }}
          RETRY_QUEUE_KV_ID: ${{ secrets.RETRY_QUEUE_KV_ID }}
          RETRY_QUEUE_KV_PREVIEW_ID: ${{ secrets.RETRY_QUEUE_KV_PREVIEW_ID }}
          ENTITLEMENT_EVENTS_QUEUE: ${{ secrets.ENTITLEMENT_EVENTS_QUEUE }}
        run: node scripts/inject-entitlement-deploy-config.cjs

      - name: Validate deployment configs
        if: steps.production_secrets.outputs.ready == 'true'
        run: |
          npm run validate:deploy:website
          npm run validate:deploy:bookings
          npm run validate:deploy:entitlement

      - name: Block placeholder KV namespace
        if: steps.production_secrets.outputs.ready == 'true'
        shell: bash
        run: |
          if grep -R "YOUR_KV_NAMESPACE_ID" apps/flagship-site/wrangler.toml; then
            echo "ENTITLEMENTS_KV still contains placeholder namespace ID."
            exit 1
          fi

      - name: Verify Cloudflare secrets
        if: steps.production_secrets.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Set Memberstack JWT Public Key
        if: steps.production_secrets.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
        run: |
          test -n "$MEMBERSTACK_JWT_PUBLIC_KEY" || (echo "Missing MEMBERSTACK_JWT_PUBLIC_KEY" && exit 1)
          printf '%s' "$MEMBERSTACK_JWT_PUBLIC_KEY" | npx wrangler secret put MEMBERSTACK_JWT_PUBLIC_KEY --config wix/bookings/wrangler.toml --env production

      - name: Deploy Workers
        if: steps.production_secrets.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --config wix/bookings/wrangler.toml --env production
          npx wrangler deploy --config operations/entitlement-system/wrangler.toml

      - name: Deploy flagship site
        if: steps.production_secrets.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/flagship-site/wrangler.toml

      - name: Deployment summary
        if: steps.production_secrets.outputs.ready == 'true'
        run: |
          echo "JPV-OS production deployment completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Source: main" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Brand gate: jaypventures=creator, jaypventuresllc=labs/institutional/business" >> $GITHUB_STEP_SUMMARY

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
