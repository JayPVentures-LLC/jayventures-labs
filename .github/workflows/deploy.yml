name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "wix/bookings/src/**"
      - "wix/bookings/wrangler.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-bookings-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs on every deploy to ensure the secret is present; Wrangler secrets
      # persist in Cloudflare but re-setting is safe and guards against accidental deletion.
      - name: Set Memberstack JWT Public Key (required by wrangler secret)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
        run: |
          echo "${MEMBERSTACK_JWT_PUBLIC_KEY}" | npx wrangler secret put MEMBERSTACK_JWT_PUBLIC_KEY --config wix/bookings/wrangler.toml --env production

      - name: Build Worker
        run: npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
