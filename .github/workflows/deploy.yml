name: Deploy Cloudflare Worker

on:
  workflow_dispatch:

concurrency:
  group: deploy-bookings-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Verify required production secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$MEMBERSTACK_JWT_PUBLIC_KEY" || (echo "Missing MEMBERSTACK_JWT_PUBLIC_KEY" && exit 1)

      - name: Validate deploy config
        run: npm run validate:deploy:bookings

      # Runs on every deploy to ensure the secret is present; Wrangler secrets
      # persist in Cloudflare but re-setting is safe and guards against accidental deletion.
      - name: Set Memberstack JWT Public Key (required by wrangler secret)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MEMBERSTACK_JWT_PUBLIC_KEY: ${{ secrets.MEMBERSTACK_JWT_PUBLIC_KEY }}
        run: |
          echo "${MEMBERSTACK_JWT_PUBLIC_KEY}" | npx wrangler secret put MEMBERSTACK_JWT_PUBLIC_KEY --config wix/bookings/wrangler.toml --env production

      - name: Build Worker
        run: npm run build:worker

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

