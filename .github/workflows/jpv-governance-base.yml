name: JPV Governance Base

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  governance:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22

      - name: Governance validation
        shell: pwsh
        run: |
          ./scripts/governance/validate-people-protection.ps1

      - name: Policy enforcement validation
        shell: pwsh
        run: |
          node ./scripts/jpv-policy-enforcement.cjs

      - name: Deployment freeze validation
        shell: pwsh
        run: |
          node ./scripts/governance/check-deployment-freeze.mjs
