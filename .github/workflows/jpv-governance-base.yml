name: JPV Governance Base

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  governance:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Governance validation
        shell: pwsh
        run: |
          ./scripts/governance/validate-people-protection.ps1

      - name: Policy enforcement validation
        shell: pwsh
        run: |
          node ./scripts/jpv-policy-enforcement.cjs

      - name: Deployment freeze validation
        shell: pwsh
        run: |
          node ./scripts/governance/check-deployment-freeze.mjs
