name: jpv-policy-enforcement

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  people-protection:
    name: Verify Governance, Security, and People Protection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22

      - name: Run JPV-OS policy enforcement gate
        run: node scripts/jpv-policy-enforcement.cjs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

