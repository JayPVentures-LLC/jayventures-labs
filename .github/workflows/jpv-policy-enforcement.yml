name: jpv-policy-enforcement

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  people-protection:
    name: Verify Governance, Security, and People Protection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run JPV-OS policy enforcement gate
        run: node scripts/jpv-policy-enforcement.cjs


