name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:


permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit root dependency graph
        run: npm audit --audit-level=moderate

      - name: Audit enforcement dependency graph
        run: npm --prefix operations/jpv_os_enforcement audit --audit-level=moderate

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Validate flagship site packaging
        run: npm run deploy:dryrun:website

      - name: Validate entitlement worker packaging
        run: npm run deploy:dryrun:entitlement

      - name: Validate bookings worker packaging
        run: npm run deploy:dryrun:bookings

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
