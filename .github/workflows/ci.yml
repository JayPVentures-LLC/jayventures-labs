name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Validate flagship site packaging
        run: npm run deploy:dryrun:website

      - name: Validate entitlement worker packaging
        run: npm run deploy:dryrun:entitlement

      - name: Validate bookings worker packaging
        run: npm run deploy:dryrun:bookings
