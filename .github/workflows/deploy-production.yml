name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate-build-deploy:
    name: Validate, Build, and Deploy Production
    runs-on: ubuntu-latest
    environment: cloudflare-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify main branch only
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Production deploys must run from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Discord brand mapping
        run: npm run validate:discord-brand-map

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Validate entitlement deploy config
        run: npm run validate:deploy:entitlement

      - name: Validate bookings deploy config
        run: npm run validate:deploy:bookings

      - name: Validate flagship site deploy config
        run: npm run validate:deploy:website

      - name: Build
        run: npm run build

      - name: Verify Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "❌ Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "❌ Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          echo "✅ Cloudflare secrets present"

      - name: Block placeholder KV namespace
        shell: bash
        run: |
          if grep -q "YOUR_KV_NAMESPACE_ID" apps/flagship-site/wrangler.toml; then
            echo "❌ apps/flagship-site/wrangler.toml still contains YOUR_KV_NAMESPACE_ID."
            echo "   Set the real ENTITLEMENTS_KV namespace ID before deploying."
            exit 1
          fi
          echo "✅ KV namespace placeholder check passed"

      - name: Deploy entitlement worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config operations/entitlement-system/wrangler.toml

      - name: Deploy bookings worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wix/bookings/wrangler.toml --env production

      - name: Deploy flagship website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/flagship-site/wrangler.toml

      - name: Smoke test — health check
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Post-deploy health checks"
          ENTITLEMENT_WORKER_URL="https://jaypventures-entitlement-system.${CLOUDFLARE_ACCOUNT_ID}.workers.dev"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${ENTITLEMENT_WORKER_URL}/health" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Entitlement worker health check passed (HTTP ${STATUS})"
          else
            echo "⚠️  Entitlement worker health check returned HTTP ${STATUS} — verify deployment manually"
          fi

      - name: Deployment summary
        run: |
          echo "========================================="
          echo "Production deployment completed."
          echo "========================================="
          echo "Validated:"
          echo "  ✅ Discord brand mapping"
          echo "  ✅ Tests"
          echo "  ✅ Typecheck"
          echo "  ✅ Deploy configs (no placeholders)"
          echo "  ✅ Build"
          echo "  ✅ Cloudflare secrets"
          echo "  ✅ ENTITLEMENTS_KV namespace configured"
          echo "Deployed:"
          echo "  ✅ Entitlement worker"
          echo "  ✅ Bookings worker"
          echo "  ✅ Flagship website"
          echo "========================================="
