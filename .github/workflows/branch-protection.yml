name: Configure Branch Protection

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/branch-protection.yml"

permissions:
  contents: read

jobs:
  configure-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Configure main branch protection
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            try {
              await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch,
                required_status_checks: {
                  strict: true,
                  contexts: ['verify']
                },
                enforce_admins: false,
                required_pull_request_reviews: {
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1
                },
                restrictions: null,
                allow_force_pushes: false,
                allow_deletions: false,
                block_creations: false,
                required_conversation_resolution: true
              });
              console.log(`✅ Branch protection configured for ${branch}`);
            } catch (error) {
              if (error.status === 403) {
                console.log('⚠️ Insufficient permissions to configure branch protection.');
                console.log('Please configure branch protection manually in repository settings:');
                console.log(`https://github.com/${owner}/${repo}/settings/branches`);
                console.log('');
                console.log('Recommended settings:');
                console.log('- Require a pull request before merging');
                console.log('- Require approvals: 1');
                console.log('- Dismiss stale pull request approvals when new commits are pushed');
                console.log('- Require review from Code Owners');
                console.log('- Require status checks to pass before merging');
                console.log('- Require branches to be up to date before merging');
                console.log('- Status check: verify');
                console.log('- Require conversation resolution before merging');
                console.log('- Do not allow force pushes');
                console.log('- Do not allow deletions');
              } else {
                throw error;
              }
            }
