name: JPVOs Brand Enforcement

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  enforce:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
      - name: Run JPVOs enforcement on all .md, .ts, .js, and .json files
        run: |
          for file in $(find . -type f \( -name '*.md' -o -name '*.ts' -o -name '*.js' -o -name '*.json' \) -not -path './node_modules/*' -not -path './.next/*'); do
            echo "Checking $file for brand violations..."
            ./node_modules/.bin/ts-node operations/jpv_os_enforcement/cli.ts jaypventures_llc "$(cat $file)"
          done
