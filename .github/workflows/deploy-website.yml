name: deploy-website

on:
  workflow_dispatch:

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-website:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment freeze
        run: npm run governance:freeze-check

      - name: Validate website deploy config
        run: npm run validate:deploy:website

      - name: Deploy flagship website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config apps/flagship-site/wrangler.toml
