[vars]
LOG_LEVEL = "info"

[[kv_namespaces]]
binding = "ENTITLEMENT_KV"
id = "REPLACE_WITH_ENTITLEMENT_KV_ID"
preview_id = "REPLACE_WITH_ENTITLEMENT_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "REPLACE_WITH_IDEMPOTENCY_KV_ID"
preview_id = "REPLACE_WITH_IDEMPOTENCY_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "RETRY_QUEUE_KV"
id = "REPLACE_WITH_RETRY_QUEUE_KV_ID"
preview_id = "REPLACE_WITH_RETRY_QUEUE_KV_PREVIEW_ID"
